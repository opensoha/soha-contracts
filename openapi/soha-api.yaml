openapi: 3.1.0
info:
  title: Soha API
  version: 0.1.2
  description: >
    Public OpenSoha core API contract. This first contract focuses on stable
    cross-repository boundaries: auth, health, runner-facing control-plane
    callbacks, AI Gateway, and MCP capability discovery.
servers:
  - url: /api/v1
    description: Soha API v1
security:
  - bearerAuth: []
tags:
  - name: System
  - name: Auth
  - name: Runner
  - name: Applications
  - name: Delivery
  - name: Platform
  - name: Settings
  - name: AI Workbench
  - name: Knowledge
  - name: Context
  - name: Evaluation
  - name: Agent Providers
  - name: Agent Fleet
  - name: Memory
  - name: AI Gateway
  - name: Compute
  - name: MCP
  - name: Plugins
paths:
  /healthz:
    get:
      tags: [System]
      operationId: getHealthz
      security: []
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /readyz:
    get:
      tags: [System]
      operationId: getReadyz
      security: []
      responses:
        "200":
          description: Process is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /auth/providers:
    get:
      tags: [Auth]
      operationId: listAuthProviders
      security: []
      responses:
        "200":
          description: Enabled login providers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthProviderListEnvelope"
  /auth/login-options:
    get:
      tags: [Auth]
      operationId: getAuthLoginOptions
      security: []
      responses:
        "200":
          description: Login verification options.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginOptionsEnvelope"
  /auth/login:
    post:
      tags: [Auth]
      operationId: passwordLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordLoginRequest"
      responses:
        "200":
          description: Authenticated session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResultEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshAuthSession
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Refreshed token set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResultEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /auth/oidc/login:
    get:
      tags: [Auth]
      operationId: beginOIDCLogin
      security: []
      responses:
        "302":
          description: Redirect to the configured OIDC provider.
  /auth/oidc/callback:
    get:
      tags: [Auth]
      operationId: handleOIDCCallback
      security: []
      parameters:
        - $ref: "#/components/parameters/OIDCCode"
        - $ref: "#/components/parameters/OIDCState"
      responses:
        "302":
          description: Redirect back to the web console with an exchange code.
  /auth/oidc/exchange:
    post:
      tags: [Auth]
      operationId: exchangeOIDCCode
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OIDCExchangeRequest"
      responses:
        "200":
          description: Authenticated session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResultEnvelope"
  /auth/login/{providerID}/start:
    get:
      tags: [Auth]
      operationId: beginProviderLogin
      security: []
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "302":
          description: Redirect to the selected identity provider.
  /auth/login/{providerID}/callback:
    get:
      tags: [Auth]
      operationId: handleProviderCallback
      security: []
      parameters:
        - $ref: "#/components/parameters/ProviderID"
        - $ref: "#/components/parameters/OIDCCode"
        - $ref: "#/components/parameters/OIDCState"
      responses:
        "302":
          description: Redirect back to the web console with an exchange code.
  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentPrincipal
      responses:
        "200":
          description: Current principal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrincipalEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /auth/profile:
    get:
      tags: [Auth]
      operationId: getCurrentUserProfile
      responses:
        "200":
          description: Current user profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileEnvelope"
  /auth/bootstrap:
    get:
      tags: [Auth]
      operationId: getAuthBootstrap
      responses:
        "200":
          description: Principal, permission snapshot, and branding bootstrap data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthBootstrapEnvelope"
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logoutAuthSession
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: Session logged out.
        "401":
          $ref: "#/components/responses/Error"
  /auth/stream-ticket:
    post:
      tags: [Auth]
      operationId: issueStreamTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamTicketRequest"
      responses:
        "200":
          description: Short-lived stream ticket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamTicketEnvelope"
  /settings/ai:
    get:
      tags: [Settings]
      operationId: getAISettings
      x-soha-implementation-status: implemented
      responses:
        "200":
          description: AI Workbench settings. Provider credentials and upstream connection details are intentionally excluded; provider ingress is managed by AI Gateway relay upstreams and model routes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISettingsEnvelope"
        "403":
          $ref: "#/components/responses/Error"
  /settings/ai/workbench-model:
    put:
      tags: [Settings]
      operationId: updateAIWorkbenchModelSettings
      x-soha-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAIWorkbenchModelRequest"
      responses:
        "200":
          description: Updated AI Workbench default model and route selection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISettingsEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /settings/ai/skills:
    put:
      tags: [Settings]
      operationId: updateAISkillsRegistry
      x-soha-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAISkillsRequest"
      responses:
        "200":
          description: Updated AI Workbench skills registry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISettingsEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /applications:
    get:
      tags: [Applications]
      operationId: listApplications
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Applications visible to the current principal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationListEnvelope"
        "403":
          $ref: "#/components/responses/Error"
    post:
      tags: [Applications]
      operationId: createApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Created application.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /applications/{applicationID}:
    get:
      tags: [Applications]
      operationId: getApplication
      parameters:
        - $ref: "#/components/parameters/ApplicationID"
      responses:
        "200":
          description: Application detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationEnvelope"
        "404":
          $ref: "#/components/responses/Error"
    put:
      tags: [Applications]
      operationId: updateApplication
      parameters:
        - $ref: "#/components/parameters/ApplicationID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "200":
          description: Updated application.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Applications]
      operationId: deleteApplication
      parameters:
        - $ref: "#/components/parameters/ApplicationID"
      responses:
        "200":
          description: Deleted application.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /applications/{applicationID}/detail:
    get:
      tags: [Applications, Delivery]
      operationId: getApplicationDeliveryDetail
      parameters:
        - $ref: "#/components/parameters/ApplicationID"
      responses:
        "200":
          description: Application delivery rollup.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationDeliveryDetailEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /applications/{applicationID}/runtime:
    get:
      tags: [Applications, Delivery]
      operationId: getApplicationRuntimeDetail
      parameters:
        - $ref: "#/components/parameters/ApplicationID"
      responses:
        "200":
          description: Application runtime rollup.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationRuntimeDetailEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /applications/{applicationID}/services:
    get:
      tags: [Applications]
      operationId: listApplicationServices
      parameters:
        - $ref: "#/components/parameters/ApplicationID"
      responses:
        "200":
          description: Application services.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationServiceListEnvelope"
        "404":
          $ref: "#/components/responses/Error"
    post:
      tags: [Applications]
      operationId: createApplicationService
      parameters:
        - $ref: "#/components/parameters/ApplicationID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationServiceInput"
      responses:
        "201":
          description: Created application service.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationServiceEnvelope"
        "400":
          $ref: "#/components/responses/Error"
  /applications/{applicationID}/services/{serviceID}:
    get:
      tags: [Applications]
      operationId: getApplicationService
      parameters:
        - $ref: "#/components/parameters/ApplicationID"
        - $ref: "#/components/parameters/ServiceID"
      responses:
        "200":
          description: Application service.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationServiceEnvelope"
        "404":
          $ref: "#/components/responses/Error"
    put:
      tags: [Applications]
      operationId: updateApplicationService
      parameters:
        - $ref: "#/components/parameters/ApplicationID"
        - $ref: "#/components/parameters/ServiceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationServiceInput"
      responses:
        "200":
          description: Updated application service.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationServiceEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Applications]
      operationId: deleteApplicationService
      parameters:
        - $ref: "#/components/parameters/ApplicationID"
        - $ref: "#/components/parameters/ServiceID"
      responses:
        "200":
          description: Deleted application service.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
        "404":
          $ref: "#/components/responses/Error"
  /applications/{applicationID}/delivery-actions:
    post:
      tags: [Applications, Delivery]
      operationId: triggerApplicationDeliveryAction
      parameters:
        - $ref: "#/components/parameters/ApplicationID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationDeliveryActionRequest"
      responses:
        "200":
          description: Delivery action result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationDeliveryActionResultEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /application-environments:
    get:
      tags: [Delivery]
      operationId: listApplicationEnvironments
      parameters:
        - name: applicationId
          in: query
          required: false
          schema:
            type: string
        - name: environmentId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Application environment bindings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationEnvironmentListEnvelope"
    post:
      tags: [Delivery]
      operationId: createApplicationEnvironment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationEnvironmentInput"
      responses:
        "201":
          description: Created application environment binding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationEnvironmentEnvelope"
        "400":
          $ref: "#/components/responses/Error"
  /application-environments/{applicationEnvironmentID}:
    get:
      tags: [Delivery]
      operationId: getApplicationEnvironment
      parameters:
        - $ref: "#/components/parameters/ApplicationEnvironmentID"
      responses:
        "200":
          description: Application environment binding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationEnvironmentEnvelope"
        "404":
          $ref: "#/components/responses/Error"
    put:
      tags: [Delivery]
      operationId: updateApplicationEnvironment
      parameters:
        - $ref: "#/components/parameters/ApplicationEnvironmentID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationEnvironmentInput"
      responses:
        "200":
          description: Updated application environment binding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationEnvironmentEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Delivery]
      operationId: deleteApplicationEnvironment
      parameters:
        - $ref: "#/components/parameters/ApplicationEnvironmentID"
      responses:
        "200":
          description: Deleted application environment binding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
        "404":
          $ref: "#/components/responses/Error"
  /application-environments/{applicationEnvironmentID}/detail:
    get:
      tags: [Delivery]
      operationId: getApplicationEnvironmentDeliveryDetail
      parameters:
        - $ref: "#/components/parameters/ApplicationEnvironmentID"
      responses:
        "200":
          description: Application environment delivery detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationEnvironmentDeliveryDetailEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /build-templates:
    get:
      tags: [Delivery]
      operationId: listBuildTemplates
      responses:
        "200":
          description: Build templates.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildTemplateListEnvelope"
    post:
      tags: [Delivery]
      operationId: createBuildTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildTemplateInput"
      responses:
        "201":
          description: Created build template.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildTemplateEnvelope"
  /build-templates/{buildTemplateID}:
    put:
      tags: [Delivery]
      operationId: updateBuildTemplate
      parameters:
        - $ref: "#/components/parameters/BuildTemplateID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildTemplateInput"
      responses:
        "200":
          description: Updated build template.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildTemplateEnvelope"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Delivery]
      operationId: deleteBuildTemplate
      parameters:
        - $ref: "#/components/parameters/BuildTemplateID"
      responses:
        "200":
          description: Deleted build template.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
        "404":
          $ref: "#/components/responses/Error"
  /workflow-templates:
    get:
      tags: [Delivery]
      operationId: listWorkflowTemplates
      responses:
        "200":
          description: Workflow templates.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowTemplateListEnvelope"
    post:
      tags: [Delivery]
      operationId: createWorkflowTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowTemplateInput"
      responses:
        "201":
          description: Created workflow template.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowTemplateEnvelope"
  /workflow-templates/{workflowTemplateID}:
    put:
      tags: [Delivery]
      operationId: updateWorkflowTemplate
      parameters:
        - $ref: "#/components/parameters/WorkflowTemplateID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowTemplateInput"
      responses:
        "200":
          description: Updated workflow template.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowTemplateEnvelope"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Delivery]
      operationId: deleteWorkflowTemplate
      parameters:
        - $ref: "#/components/parameters/WorkflowTemplateID"
      responses:
        "200":
          description: Deleted workflow template.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
        "404":
          $ref: "#/components/responses/Error"
  /delivery/plans:
    post:
      tags: [Delivery]
      operationId: createDeliveryPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryPlanInput"
      responses:
        "200":
          description: Created delivery plan draft.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryPlanEnvelope"
        "400":
          $ref: "#/components/responses/Error"
  /delivery/plans/{planID}:
    get:
      tags: [Delivery]
      operationId: getDeliveryPlan
      parameters:
        - $ref: "#/components/parameters/PlanID"
      responses:
        "200":
          description: Delivery plan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryPlanEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /delivery/plans/{planID}/confirm:
    post:
      tags: [Delivery]
      operationId: confirmDeliveryPlan
      parameters:
        - $ref: "#/components/parameters/PlanID"
      responses:
        "200":
          description: Confirmed delivery plan and trigger result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryPlanConfirmResultEnvelope"
        "400":
          $ref: "#/components/responses/Error"
  /delivery/release-bundles:
    get:
      tags: [Delivery]
      operationId: listReleaseBundles
      parameters:
        - name: applicationId
          in: query
          required: false
          schema:
            type: string
        - name: applicationEnvironmentId
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Release bundles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseBundleListEnvelope"
  /delivery/release-bundles/{bundleID}:
    get:
      tags: [Delivery]
      operationId: getReleaseBundle
      parameters:
        - $ref: "#/components/parameters/BundleID"
      responses:
        "200":
          description: Release bundle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseBundleEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /delivery/release-bundles/{bundleID}/artifacts:
    get:
      tags: [Delivery]
      operationId: listReleaseBundleArtifacts
      parameters:
        - $ref: "#/components/parameters/BundleID"
      responses:
        "200":
          description: Artifacts attached to a release bundle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionArtifactListEnvelope"
  /delivery/execution-tasks:
    get:
      tags: [Delivery]
      operationId: listDeliveryExecutionTasks
      parameters:
        - name: applicationId
          in: query
          required: false
          schema:
            type: string
        - name: applicationEnvironmentId
          in: query
          required: false
          schema:
            type: string
        - name: releaseBundleId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: providerKind
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Execution tasks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionTaskListEnvelope"
  /delivery/execution-tasks/{taskID}:
    get:
      tags: [Delivery]
      operationId: getDeliveryExecutionTask
      parameters:
        - $ref: "#/components/parameters/TaskID"
      responses:
        "200":
          description: Execution task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionTaskEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /delivery/execution-tasks/{taskID}/artifacts:
    get:
      tags: [Delivery]
      operationId: listExecutionTaskArtifacts
      parameters:
        - $ref: "#/components/parameters/TaskID"
      responses:
        "200":
          description: Artifacts attached to an execution task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionArtifactListEnvelope"
  /delivery/artifacts:
    get:
      tags: [Delivery]
      operationId: listDeliveryArtifacts
      parameters:
        - name: applicationId
          in: query
          required: false
          schema:
            type: string
        - name: applicationEnvironmentId
          in: query
          required: false
          schema:
            type: string
        - name: workflowRunId
          in: query
          required: false
          schema:
            type: string
        - name: workflowNodeId
          in: query
          required: false
          schema:
            type: string
        - name: releaseBundleId

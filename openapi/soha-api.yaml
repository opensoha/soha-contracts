components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    runtimeBearerAuth:
      type: http
      scheme: bearer
      description: Runtime execution runner token.
    sohaXAPIKey:
      type: apiKey
      in: header
      name: x-api-key
      description: Anthropic-style Soha PAT/SAT credential header for native relay endpoints.
  parameters:
    AIClientID:
      name: aiClientId
      in: query
      required: false
      schema:
        type: string
    AIClientName:
      name: aiClientName
      in: query
      required: false
      schema:
        type: string
    OIDCCode:
      name: code
      in: query
      required: false
      schema:
        type: string
    OIDCState:
      name: state
      in: query
      required: false
      schema:
        type: string
    OperationID:
      name: operationID
      in: path
      required: true
      schema:
        type: string
    ProviderID:
      name: providerID
      in: path
      required: true
      schema:
        type: string
    PluginID:
      name: pluginID
      in: path
      required: true
      schema:
        type: string
    SkillID:
      name: skillId
      in: query
      required: false
      schema:
        type: string
    Source:
      name: source
      in: query
      required: false
      schema:
        type: string
    TaskID:
      name: taskID
      in: path
      required: true
      schema:
        type: string
    ToolName:
      name: toolName
      in: path
      required: true
      schema:
        type: string
    UpstreamID:
      name: upstreamID
      in: path
      required: true
      schema:
        type: string
    RouteID:
      name: routeID
      in: path
      required: true
      schema:
        type: string
    OpenAICompatibleProvider:
      name: openaiCompatibleProvider
      in: path
      required: true
      schema:
        type: string
        enum: [deepseek, qwen, openrouter, azure-openai]
      description: First-class OpenAI-compatible relay provider kind. Azure OpenAI uses Azure data-plane URL and api-key header adaptation upstream.
    SohaUpstreamIDHeader:
      name: X-Soha-Upstream-ID
      in: header
      required: false
      schema:
        type: string
      description: Optional debug override for administrators or tokens explicitly allowed to select an upstream.
    SohaRouteTraceHeader:
      name: X-Soha-Route-Trace
      in: header
      required: false
      schema:
        type: boolean
      description: When true, returns redacted Soha route trace response headers for relay managers or tokens with allowRouteTrace explicitly enabled.
    SohaCacheModeHeader:
      name: X-Soha-Cache-Mode
      in: header
      required: false
      schema:
        type: string
        enum: [default, bypass, read-only, refresh]
      description: Optional relay cache behavior hint.
  headers:
    SohaRouteIDHeader:
      schema:
        type: string
      description: Selected Soha relay route ID returned when X-Soha-Route-Trace is authorized.
    SohaSelectedUpstreamIDHeader:
      schema:
        type: string
      description: Selected Soha relay upstream ID returned when X-Soha-Route-Trace is authorized.
    SohaProviderKindHeader:
      schema:
        type: string
      description: Selected upstream provider kind returned when X-Soha-Route-Trace is authorized.
    SohaPublicModelHeader:
      schema:
        type: string
      description: Public model requested by the client returned when X-Soha-Route-Trace is authorized.
    SohaUpstreamModelHeader:
      schema:
        type: string
      description: Upstream model selected by Soha returned when X-Soha-Route-Trace is authorized.
    SohaRelayEndpointHeader:
      schema:
        type: string
      description: Relay endpoint returned when X-Soha-Route-Trace is authorized.
    SohaRelayStreamHeader:
      schema:
        type: boolean
      description: Whether the relayed request streamed upstream output, returned when X-Soha-Route-Trace is authorized.
    SohaUpstreamStatusHeader:
      schema:
        type: string
      description: Upstream HTTP status returned when X-Soha-Route-Trace is authorized.
    SohaCacheStatusHeader:
      schema:
        type: string
      description: Relay cache status returned when X-Soha-Route-Trace is authorized.
  responses:
    Error:
      description: Standard Soha API error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    AnyValue: {}
    GenericObject:
      type: object
      additionalProperties: true
    GenericDataEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/AnyValue"
      additionalProperties: false
    GenericItemsEnvelope:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AnyValue"
      additionalProperties: false
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
          additionalProperties: false
      additionalProperties: false
    AIWorkbenchModelSettings:
      type: object
      required: [enabled]
      properties:
        defaultPublicModel:
          type: string
          description: Public model name exposed by AI Gateway model routes and used as the Workbench default.
        defaultRouteId:
          type: string
          description: Stable AI Gateway model-route ID used as the Workbench default when set.
        defaultEndpoint:
          type: string
          description: Workbench relay endpoint. Supported values are chat/completions, responses, and messages.
          default: chat/completions
        enabled:
          type: boolean
      additionalProperties: false
    AISkillSettings:
      type: object
      required: [id, name, enabled]
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        ownerModule:
          type: string
        description:
          type: string
        capabilityRefs:
          type: array
          items:
            type: string
        blueprintRefs:
          type: array
          items:
            type: string
        inputSchema:
          type: object
          additionalProperties: true
        outputSchema:
          type: object
          additionalProperties: true
        scopeRules:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        scopes:
          type: array
          items:
            type: string
      additionalProperties: false
    AISettings:
      type: object
      required: [workbenchModel, skillsRegistry]
      properties:
        workbenchModel:
          $ref: "#/components/schemas/AIWorkbenchModelSettings"
        skillsRegistry:
          type: array
          items:
            $ref: "#/components/schemas/AISkillSettings"
      additionalProperties: false
    AISettingsEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/AISettings"
      additionalProperties: false
    UpdateAIWorkbenchModelRequest:
      type: object
      required: [workbenchModel]
      properties:
        workbenchModel:
          $ref: "#/components/schemas/AIWorkbenchModelSettings"
      additionalProperties: false
    UpdateAISkillsRequest:
      type: object
      required: [skillsRegistry]
      properties:
        skillsRegistry:
          type: array
          items:
            $ref: "#/components/schemas/AISkillSettings"
      additionalProperties: false
    Principal:
      type: object
      required: [userId, userName, email, roles, teams, projects, tags]
      properties:
        userId:
          type: string
        userName:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
        teams:
          type: array
          items:
            type: string
        projects:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        permissionKeys:
          type: array
          items:
            type: string
      additionalProperties: true
    UserProfile:
      type: object
      required: [userId, username, displayName, email, status, roles, teams, projects, tags]
      properties:
        userId:
          type: string
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        phone:
          type: string
        status:
          type: string
        roles:
          type: array
          items:
            type: string
        teams:
          type: array
          items:
            type: string
        projects:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        identities:
          type: array
          items:
            type: object
            additionalProperties: true
        sessions:
          type: array
          items:
            type: object
            additionalProperties: true
        lastLoginAt:
          type: string
          format: date-time
      additionalProperties: true
    TokenSet:
      type: object
      required: [accessToken, refreshToken, tokenType, expiresIn, expiresAt]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
          format: int64
        expiresAt:
          type: string
          format: date-time
      additionalProperties: false
    AuthResult:
      type: object
      required: [user, tokens]
      properties:
        user:
          $ref: "#/components/schemas/Principal"
        tokens:
          $ref: "#/components/schemas/TokenSet"
      additionalProperties: false
    AuthProvider:
      type: object
      required: [type, name, enabled]
      properties:
        type:
          type: string
        id:
          type: string
        name:
          type: string
        enabled:
          type: boolean
        loginUrl:
          type: string
      additionalProperties: false
    LoginOptions:
      type: object
      required: [verification]
      properties:
        verification:
          type: object
          required: [sliderEnabled]
          properties:
            sliderEnabled:
              type: boolean
          additionalProperties: false
      additionalProperties: false
    PasswordLoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
        password:
          type: string
      additionalProperties: false
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      additionalProperties: false
    OIDCExchangeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
      additionalProperties: false
    StreamTicketRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
      additionalProperties: false
    StreamTicket:
      type: object
      required: [ticket, expiresAt]
      properties:
        ticket:
          type: string
        expiresAt:
          type: string
          format: date-time
      additionalProperties: false
    PrincipalEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Principal"
      additionalProperties: false
    UserProfileEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/UserProfile"
      additionalProperties: false
    AuthResultEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/AuthResult"
      additionalProperties: false
    AuthProviderListEnvelope:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuthProvider"
      additionalProperties: false
    LoginOptionsEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/LoginOptions"
      additionalProperties: false
    AuthBootstrapEnvelope:
      type: object

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    runtimeBearerAuth:
      type: http
      scheme: bearer
      description: Runtime execution runner token.
    sohaXAPIKey:
      type: apiKey
      in: header
      name: x-api-key
      description: Anthropic-style Soha PAT/SAT credential header for native relay endpoints.
  parameters:
    ComputeCursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    ComputeLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    ComputeDomain:
      name: domain
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ComputeDomain"
    ComputeResourceKind:
      name: kind
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ComputeResourceKind"
    ComputeResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    ComputeTaskDomain:
      name: domain
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ComputeTaskDomain"
    ComputeTaskID:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    ComputeProviderDomain:
      name: domain
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ComputeProviderDomain"
    ComputeProviderKey:
      name: providerKey
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z][a-z0-9._-]*$"
    ComputeProviderInstanceRef:
      name: instanceRef
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    ComputeActionID:
      name: action
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z][a-z0-9._-]*$"
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    ApplicationID:
      name: applicationID
      in: path
      required: true
      schema:
        type: string
    ApplicationEnvironmentID:
      name: applicationEnvironmentID
      in: path
      required: true
      schema:
        type: string
    AIClientID:
      name: aiClientId
      in: query
      required: false
      schema:
        type: string
    BuildTemplateID:
      name: buildTemplateID
      in: path
      required: true
      schema:
        type: string
    BundleID:
      name: bundleID
      in: path
      required: true
      schema:
        type: string
    AIClientName:
      name: aiClientName
      in: query
      required: false
      schema:
        type: string
    OIDCCode:
      name: code
      in: query
      required: false
      schema:
        type: string
    OIDCState:
      name: state
      in: query
      required: false
      schema:
        type: string
    OperationID:
      name: operationID
      in: path
      required: true
      schema:
        type: string
    ProviderID:
      name: providerID
      in: path
      required: true
      schema:
        type: string
    PluginID:
      name: pluginID
      in: path
      required: true
      schema:
        type: string
    KnowledgeBaseID:
      name: baseID
      in: path
      required: true
      schema:
        type: string
    KnowledgeSourceID:
      name: sourceID
      in: path
      required: true
      schema:
        type: string
    KnowledgeConnectorID:
      name: connectorID
      in: path
      required: true
      schema: { type: string, minLength: 1, maxLength: 128 }
    KnowledgeIngestionJobID:
      name: jobID
      in: path
      required: true
      schema: { type: string, minLength: 1, maxLength: 128 }
    KnowledgeGraphRevisionID:
      name: revisionID
      in: path
      required: true
      schema: { type: string, minLength: 1, maxLength: 128 }
    KnowledgeListLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    EvaluationRunID:
      name: runID
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    AIMemoryID:
      name: memoryID
      in: path
      required: true
      schema: { type: string, minLength: 1, maxLength: 128 }
    MultiAgentPlanID:
      name: planID
      in: path
      required: true
      schema: { type: string, minLength: 1, maxLength: 128 }
    MultiAgentSubtaskID:
      name: subtaskID
      in: path
      required: true
      schema: { type: string, minLength: 1, maxLength: 128 }
    AgentProviderRolloutID:
      name: rolloutID
      in: path
      required: true
      schema: { type: string, minLength: 1, maxLength: 128 }
    AgentProviderRolloutAction:
      name: rolloutAction
      in: path
      required: true
      schema:
        type: string
        enum: [pause, resume, rollback]
    AIEnvironmentLeaseID:
      name: leaseID
      in: path
      required: true
      schema: { type: string, minLength: 1, maxLength: 128 }
    PlanID:
      name: planID
      in: path
      required: true
      schema:
        type: string
    ServiceID:
      name: serviceID
      in: path
      required: true
      schema:
        type: string
    SessionID:
      name: sessionID
      in: path
      required: true
      schema:
        type: string
    SkillID:
      name: skillId
      in: query
      required: false
      schema:
        type: string
    Source:
      name: source
      in: query
      required: false
      schema:
        type: string
    TaskID:
      name: taskID
      in: path
      required: true
      schema:
        type: string
    ToolName:
      name: toolName
      in: path
      required: true
      schema:
        type: string
    WorkflowTemplateID:
      name: workflowTemplateID
      in: path
      required: true
      schema:
        type: string
    UpstreamID:
      name: upstreamID
      in: path
      required: true
      schema:
        type: string
    RouteID:
      name: routeID
      in: path
      required: true
      schema:
        type: string
    OpenAICompatibleProvider:
      name: openaiCompatibleProvider
      in: path
      required: true
      schema:
        type: string
        enum: [deepseek, qwen, openrouter, azure-openai]
      description: First-class OpenAI-compatible relay provider kind. Azure OpenAI uses Azure data-plane URL and api-key header adaptation upstream.
    SohaUpstreamIDHeader:
      name: X-Soha-Upstream-ID
      in: header
      required: false
      schema:
        type: string
      description: Optional debug override for administrators or tokens explicitly allowed to select an upstream.
    SohaRouteTraceHeader:
      name: X-Soha-Route-Trace
      in: header
      required: false
      schema:
        type: boolean
      description: When true, returns redacted Soha route trace response headers for relay managers or tokens with allowRouteTrace explicitly enabled.
    SohaCacheModeHeader:
      name: X-Soha-Cache-Mode
      in: header
      required: false
      schema:
        type: string
        enum: [default, bypass, read-only, refresh]
      description: Optional relay cache behavior hint.
  headers:
    SohaRouteIDHeader:
      schema:
        type: string
      description: Selected Soha relay route ID returned when X-Soha-Route-Trace is authorized.
    SohaSelectedUpstreamIDHeader:
      schema:
        type: string
      description: Selected Soha relay upstream ID returned when X-Soha-Route-Trace is authorized.
    SohaProviderKindHeader:
      schema:
        type: string
      description: Selected upstream provider kind returned when X-Soha-Route-Trace is authorized.
    SohaPublicModelHeader:
      schema:
        type: string
      description: Public model requested by the client returned when X-Soha-Route-Trace is authorized.
    SohaUpstreamModelHeader:
      schema:
        type: string
      description: Upstream model selected by Soha returned when X-Soha-Route-Trace is authorized.
    SohaRelayEndpointHeader:
      schema:
        type: string
      description: Relay endpoint returned when X-Soha-Route-Trace is authorized.
    SohaRelayStreamHeader:
      schema:
        type: boolean
      description: Whether the relayed request streamed upstream output, returned when X-Soha-Route-Trace is authorized.
    SohaUpstreamStatusHeader:
      schema:
        type: string
      description: Upstream HTTP status returned when X-Soha-Route-Trace is authorized.
    SohaCacheStatusHeader:
      schema:
        type: string
      description: Relay cache status returned when X-Soha-Route-Trace is authorized.
  responses:
    Error:
      description: Standard Soha API error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ComputeError:
      description: Stable redacted Compute API error. Provider raw responses, endpoints, and credentials are excluded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    AnyValue: {}
    GenericObject:
      type: object
      additionalProperties: true
    GenericDataEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/AnyValue"
      additionalProperties: false
    GenericItemsEnvelope:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AnyValue"
      additionalProperties: false
    ComputeDomain:
      type: string
      enum: [virtualization, container_runtime, agent]
      x-enum-varnames: [ComputeDomainVirtualization, ComputeDomainContainerRuntime, ComputeDomainAgent]
    ComputeProviderDomain:
      type: string
      enum: [virtualization, container_runtime]
      x-enum-varnames: [ComputeProviderDomainVirtualization, ComputeProviderDomainContainerRuntime]
    ComputeTaskDomain:
      type: string
      enum: [virtualization, container_runtime]
      x-enum-varnames: [ComputeTaskDomainVirtualization, ComputeTaskDomainContainerRuntime]
    ComputeResourceKind:
      type: string
      enum: [connection, cluster, vm, image, flavor, agent_host, runtime_host, project, container, service, port, template]
      x-enum-varnames: [ComputeResourceKindConnection, ComputeResourceKindCluster, ComputeResourceKindVM, ComputeResourceKindImage, ComputeResourceKindFlavor, ComputeResourceKindAgentHost, ComputeResourceKindRuntimeHost, ComputeResourceKindProject, ComputeResourceKindContainer, ComputeResourceKindService, ComputeResourceKindPort, ComputeResourceKindTemplate]
    ComputeProviderSource:
      type: string
      enum: [builtin, plugin]
      x-enum-varnames: [ComputeProviderSourceBuiltin, ComputeProviderSourcePlugin]
    ComputeAccessMode:
      type: string
      enum: [direct, agent_proxy]
      x-enum-varnames: [ComputeAccessModeDirect, ComputeAccessModeAgentProxy]
    ComputePluginRuntimeMode:
      type: string
      enum: [builtin, manifest_only, external, managed]
      x-enum-varnames: [ComputePluginRuntimeModeBuiltin, ComputePluginRuntimeModeManifestOnly, ComputePluginRuntimeModeExternal, ComputePluginRuntimeModeManaged]
    ComputeProviderActivationLevel:
      type: string
      enum: [descriptor, read, write]
      x-enum-varnames: [ComputeProviderActivationLevelDescriptor, ComputeProviderActivationLevelRead, ComputeProviderActivationLevelWrite]
    ComputeFeatureID:
      type: string
      enum: [workbench, plugin_providers, provider_read, provider_write, relations, task_actions]
      x-enum-varnames: [ComputeFeatureWorkbench, ComputeFeaturePluginProviders, ComputeFeatureProviderRead, ComputeFeatureProviderWrite, ComputeFeatureRelations, ComputeFeatureTaskActions]
    ComputeRolloutStage:
      type: string
      enum: [disabled, hidden, admin_preview, default]
      x-enum-varnames: [ComputeRolloutStageDisabled, ComputeRolloutStageHidden, ComputeRolloutStageAdminPreview, ComputeRolloutStageDefault]
    ComputeFeatureCapability:
      type: object
      required: [id, enabled, rolloutStage]
      properties:
        id: { $ref: "#/components/schemas/ComputeFeatureID" }
        enabled: { type: boolean }
        rolloutStage: { $ref: "#/components/schemas/ComputeRolloutStage" }
        maxActivationLevel: { $ref: "#/components/schemas/ComputeProviderActivationLevel" }
        reason:
          type: string
          description: Redacted explanation when a capability is unavailable to the current principal.
      additionalProperties: false
    ComputeCapabilityManifest:
      type: object
      required: [generation, features]
      properties:
        generation: { type: integer, format: int64, minimum: 0 }
        features:
          type: array
          items: { $ref: "#/components/schemas/ComputeFeatureCapability" }
      additionalProperties: false
    ComputeCapabilityManifestEnvelope:
      type: object
      required: [data]
      properties:
        data: { $ref: "#/components/schemas/ComputeCapabilityManifest" }
      additionalProperties: false
    ComputeSectionStatus:
      type: string
      enum: [ok, degraded, unavailable]
      x-enum-varnames: [ComputeSectionStatusOK, ComputeSectionStatusDegraded, ComputeSectionStatusUnavailable]
    ComputeHealthStatus:
      type: string
      enum: [healthy, degraded, unavailable, pending, unknown]
      x-enum-varnames: [ComputeHealthStatusHealthy, ComputeHealthStatusDegraded, ComputeHealthStatusUnavailable, ComputeHealthStatusPending, ComputeHealthStatusUnknown]

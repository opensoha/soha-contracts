openapi: 3.1.0
info:
  title: Soha API
  version: 0.1.0
  description: >
    Public OpenSoha core API contract. This first contract focuses on stable
    cross-repository boundaries: auth, health, runner-facing control-plane
    callbacks, AI Gateway, and MCP capability discovery.
servers:
  - url: /api/v1
    description: Soha API v1
security:
  - bearerAuth: []
tags:
  - name: System
  - name: Auth
  - name: Runner
  - name: Platform
  - name: AI Gateway
  - name: MCP
  - name: Plugins
paths:
  /healthz:
    get:
      tags: [System]
      operationId: getHealthz
      security: []
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /readyz:
    get:
      tags: [System]
      operationId: getReadyz
      security: []
      responses:
        "200":
          description: Process is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
  /auth/providers:
    get:
      tags: [Auth]
      operationId: listAuthProviders
      security: []
      responses:
        "200":
          description: Enabled login providers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthProviderListEnvelope"
  /auth/login-options:
    get:
      tags: [Auth]
      operationId: getAuthLoginOptions
      security: []
      responses:
        "200":
          description: Login verification options.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginOptionsEnvelope"
  /auth/login:
    post:
      tags: [Auth]
      operationId: passwordLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordLoginRequest"
      responses:
        "200":
          description: Authenticated session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResultEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshAuthSession
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Refreshed token set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResultEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /auth/oidc/login:
    get:
      tags: [Auth]
      operationId: beginOIDCLogin
      security: []
      responses:
        "302":
          description: Redirect to the configured OIDC provider.
  /auth/oidc/callback:
    get:
      tags: [Auth]
      operationId: handleOIDCCallback
      security: []
      parameters:
        - $ref: "#/components/parameters/OIDCCode"
        - $ref: "#/components/parameters/OIDCState"
      responses:
        "302":
          description: Redirect back to the web console with an exchange code.
  /auth/oidc/exchange:
    post:
      tags: [Auth]
      operationId: exchangeOIDCCode
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OIDCExchangeRequest"
      responses:
        "200":
          description: Authenticated session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResultEnvelope"
  /auth/login/{providerID}/start:
    get:
      tags: [Auth]
      operationId: beginProviderLogin
      security: []
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "302":
          description: Redirect to the selected identity provider.
  /auth/login/{providerID}/callback:
    get:
      tags: [Auth]
      operationId: handleProviderCallback
      security: []
      parameters:
        - $ref: "#/components/parameters/ProviderID"
        - $ref: "#/components/parameters/OIDCCode"
        - $ref: "#/components/parameters/OIDCState"
      responses:
        "302":
          description: Redirect back to the web console with an exchange code.
  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentPrincipal
      responses:
        "200":
          description: Current principal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrincipalEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /auth/profile:
    get:
      tags: [Auth]
      operationId: getCurrentUserProfile
      responses:
        "200":
          description: Current user profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileEnvelope"
  /auth/bootstrap:
    get:
      tags: [Auth]
      operationId: getAuthBootstrap
      responses:
        "200":
          description: Principal, permission snapshot, and branding bootstrap data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthBootstrapEnvelope"
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logoutAuthSession
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: Session logged out.
        "401":
          $ref: "#/components/responses/Error"
  /auth/stream-ticket:
    post:
      tags: [Auth]
      operationId: issueStreamTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamTicketRequest"
      responses:
        "200":
          description: Short-lived stream ticket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamTicketEnvelope"
  /delivery/execution-tasks/claim:
    post:
      tags: [Runner]
      operationId: claimExecutionTask
      security:
        - runtimeBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutionTaskClaimRequest"
      responses:
        "200":
          description: Claimed execution task, or empty data when none is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionTaskEnvelope"
  /delivery/execution-tasks/{taskID}/runner-status:
    get:
      tags: [Runner]
      operationId: getExecutionTaskRunnerStatus
      security:
        - runtimeBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TaskID"
      responses:
        "200":
          description: Runner-visible task status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionTaskEnvelope"
  /delivery/execution-callbacks:
    post:
      tags: [Runner]
      operationId: recordExecutionCallback
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutionCallbackRequest"
      responses:
        "200":
          description: Updated execution task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionTaskEnvelope"
  /docker/operations/claim:
    post:
      tags: [Runner]
      operationId: claimDockerOperation
      security:
        - runtimeBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DockerOperationClaimRequest"
      responses:
        "200":
          description: Claimed Docker operation, or empty data when none is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DockerOperationEnvelope"
  /docker/operations/{operationID}/runner-status:
    get:
      tags: [Runner]
      operationId: getDockerOperationRunnerStatus
      security:
        - runtimeBearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OperationID"
      responses:
        "200":
          description: Runner-visible Docker operation status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DockerOperationEnvelope"
  /docker/operation-callbacks:
    post:
      tags: [Runner]
      operationId: recordDockerOperationCallback
      security:
        - runtimeBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DockerOperationCallbackRequest"
      responses:
        "200":
          description: Updated Docker operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DockerOperationEnvelope"
  /copilot/agent-runs/claim:
    post:
      tags: [Runner]
      operationId: claimAgentRun
      security:
        - runtimeBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRunClaimRequest"
      responses:
        "200":
          description: Claimed agent run, or empty data when none is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunEnvelope"
  /copilot/agent-runs/callback:
    post:
      tags: [Runner]
      operationId: recordAgentRunCallback
      security:
        - runtimeBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRunCallbackRequest"
      responses:
        "200":
          description: Updated agent run.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunEnvelope"
  /copilot/agent-runs/tool-call:
    post:
      tags: [Runner]
      operationId: recordAgentRunToolCall
      security:
        - runtimeBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRunToolCallRequest"
      responses:
        "200":
          description: Tool call result recorded by the control plane.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentToolCallResultEnvelope"
  /copilot/agent-runs:
    get:
      tags: [Runner]
      operationId: listAgentRuns
      responses:
        "200":
          description: Agent run list visible to the current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericItemsEnvelope"
  /clusters/capabilities:
    get:
      tags: [Platform]
      operationId: listClusterCapabilityMatrix
      responses:
        "200":
          description: Cluster runtime capability matrix for Direct and Agent modes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterCapabilityMatrixEnvelope"
        "403":
          $ref: "#/components/responses/Error"
  /ai-gateway/capabilities:
    get:
      tags: [AI Gateway]
      operationId: getAIGatewayCapabilities
      parameters:
        - $ref: "#/components/parameters/AIClientID"
        - $ref: "#/components/parameters/AIClientName"
        - $ref: "#/components/parameters/SkillID"
        - $ref: "#/components/parameters/Source"
      responses:
        "200":
          description: Permission-filtered AI Gateway manifest.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIGatewayManifestEnvelope"
        "403":
          $ref: "#/components/responses/Error"
  /ai-gateway/tools/{toolName}/invoke:
    post:
      tags: [AI Gateway]
      operationId: invokeAIGatewayTool
      parameters:
        - $ref: "#/components/parameters/ToolName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolInvocationRequest"
      responses:
        "200":
          description: Gateway tool invocation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolInvocationResultEnvelope"
        "403":
          $ref: "#/components/responses/Error"
  /ai-gateway/resources/read:
    post:
      tags: [AI Gateway]
      operationId: readAIGatewayResource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceReadRequest"
      responses:
        "200":
          description: Redacted Gateway resource document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceReadResultEnvelope"
  /ai-gateway/prompts/get:
    post:
      tags: [AI Gateway]
      operationId: getAIGatewayPrompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromptGetRequest"
      responses:
        "200":
          description: Gateway prompt messages assembled by the backend.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptGetResultEnvelope"
  /ai-gateway/personal-access-tokens:
    get:
      tags: [AI Gateway]
      operationId: listPersonalAccessTokens
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
        - name: userId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Personal access tokens visible to the current principal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalAccessTokenListEnvelope"
    post:
      tags: [AI Gateway]
      operationId: createPersonalAccessToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonalAccessTokenInput"
      responses:
        "201":
          description: Newly created personal access token and one-time secret value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedPersonalAccessTokenEnvelope"
  /ai-gateway/personal-access-tokens/{tokenID}/revoke:
    post:
      tags: [AI Gateway]
      operationId: revokePersonalAccessToken
      parameters:
        - name: tokenID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Personal access token was revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
  /ai-gateway/personal-access-tokens/{tokenID}/rotate:
    post:
      tags: [AI Gateway]
      operationId: rotatePersonalAccessToken
      parameters:
        - name: tokenID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRotationInput"
      responses:
        "201":
          description: Rotated personal access token and one-time secret value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedPersonalAccessTokenEnvelope"
  /ai-gateway/service-accounts:
    get:
      tags: [AI Gateway]
      operationId: listServiceAccounts
      responses:
        "200":
          description: Service accounts visible to the current principal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceAccountListEnvelope"
    post:
      tags: [AI Gateway]
      operationId: createServiceAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceAccountInput"
      responses:
        "201":
          description: Newly created service account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceAccountEnvelope"
  /ai-gateway/service-account-tokens:
    get:
      tags: [AI Gateway]
      operationId: listServiceAccountTokens
      responses:
        "200":
          description: Service account tokens visible to the current principal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceAccountTokenListEnvelope"
  /ai-gateway/service-accounts/{serviceAccountID}/tokens:
    post:
      tags: [AI Gateway]
      operationId: createServiceAccountToken
      parameters:
        - name: serviceAccountID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceAccountTokenInput"
      responses:
        "201":
          description: Newly created service account token and one-time secret value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedServiceAccountTokenEnvelope"
  /ai-gateway/service-account-tokens/{tokenID}/revoke:
    post:
      tags: [AI Gateway]
      operationId: revokeServiceAccountToken
      parameters:
        - name: tokenID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service account token was revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
  /ai-gateway/service-account-tokens/{tokenID}/rotate:
    post:
      tags: [AI Gateway]
      operationId: rotateServiceAccountToken
      parameters:
        - name: tokenID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRotationInput"
      responses:
        "201":
          description: Rotated service account token and one-time secret value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedServiceAccountTokenEnvelope"
  /ai-gateway/audit-logs:
    get:
      tags: [AI Gateway]
      operationId: listAIGatewayAuditLogs
      parameters:
        - name: actorType
          in: query
          required: false
          schema:
            type: string
        - name: actorId
          in: query
          required: false
          schema:
            type: string
          description: Canonical actor identifier query parameter. The server also accepts actor.
        - name: aiClientId
          in: query
          required: false
          schema:
            type: string
        - name: skillId
          in: query
          required: false
          schema:
            type: string
        - name: toolName
          in: query
          required: false
          schema:
            type: string
        - name: approvalRequestId
          in: query
          required: false
          schema:
            type: string
        - name: riskLevel
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RiskLevel"
        - name: result
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: AI Gateway audit log entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListEnvelope"
  /ai-gateway/approval-requests:
    get:
      tags: [AI Gateway]
      operationId: listAIGatewayApprovalRequests
      parameters:
        - name: id
          in: query
          required: false
          schema:
            type: string
          description: Canonical approval request id query parameter. The server also accepts requestID and approvalRequestId.
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: actorType
          in: query
          required: false
          schema:
            type: string
        - name: actorId
          in: query
          required: false
          schema:
            type: string
          description: Canonical actor identifier query parameter. The server also accepts actor.
        - name: aiClientId
          in: query
          required: false
          schema:
            type: string
        - name: skillId
          in: query
          required: false
          schema:
            type: string
        - name: toolName
          in: query
          required: false
          schema:
            type: string
        - name: riskLevel
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RiskLevel"
        - name: strategy
          in: query
          required: false
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: AI Gateway approval requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRequestListEnvelope"
  /ai-gateway/approval-requests/{requestID}/timeline:
    get:
      tags: [AI Gateway]
      operationId: getAIGatewayApprovalTimeline
      parameters:
        - name: requestID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approval request timeline.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalTimelineEnvelope"
  /ai-gateway/approval-requests/{requestID}/{action}:
    post:
      tags: [AI Gateway]
      operationId: decideAIGatewayApprovalRequest
      parameters:
        - name: requestID
          in: path
          required: true
          schema:
            type: string
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [approve, reject, cancel]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecisionInput"
      responses:
        "200":
          description: Approval decision result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalDecisionResultEnvelope"
  /ai-gateway/governance/status:
    get:
      tags: [AI Gateway]
      operationId: getAIGatewayGovernanceStatus
      parameters:
        - name: windowHours
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 168
      responses:
        "200":
          description: AI Gateway governance health and usage summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceStatusEnvelope"
  /mcp/capabilities:
    get:
      tags: [MCP]
      operationId: listMCPCapabilities
      responses:
        "200":
          description: MCP adapter capability list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPCapabilityListEnvelope"
  /plugins/marketplace:
    get:
      tags: [Plugins]
      operationId: listMarketplacePlugins
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: publisher
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Marketplace plugins visible to the current principal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplacePluginListEnvelope"
  /plugins/marketplace/{pluginID}:
    get:
      tags: [Plugins]
      operationId: getMarketplacePlugin
      parameters:
        - $ref: "#/components/parameters/PluginID"
      responses:
        "200":
          description: Marketplace plugin detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplacePluginEnvelope"
  /plugins/installed:
    get:
      tags: [Plugins]
      operationId: listInstalledPlugins
      responses:
        "200":
          description: Installed plugin records.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledPluginListEnvelope"
  /plugins/install:
    post:
      tags: [Plugins]
      operationId: installPlugin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginInstallRequest"
      responses:
        "201":
          description: Installed plugin snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledPluginEnvelope"
  /plugins/{pluginID}:
    get:
      tags: [Plugins]
      operationId: getInstalledPlugin
      parameters:
        - $ref: "#/components/parameters/PluginID"
      responses:
        "200":
          description: Installed plugin record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledPluginEnvelope"
    delete:
      tags: [Plugins]
      operationId: removeInstalledPlugin
      parameters:
        - $ref: "#/components/parameters/PluginID"
      responses:
        "200":
          description: Installed plugin was removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationStatus"
  /plugins/{pluginID}/manifest:
    get:
      tags: [Plugins]
      operationId: getInstalledPluginManifest
      parameters:
        - $ref: "#/components/parameters/PluginID"
      responses:
        "200":
          description: Installed plugin manifest snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginManifestEnvelope"
  /plugins/{pluginID}/enable:
    post:
      tags: [Plugins]
      operationId: enableInstalledPlugin
      parameters:
        - $ref: "#/components/parameters/PluginID"
      responses:
        "200":
          description: Plugin enabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledPluginEnvelope"
  /plugins/{pluginID}/disable:
    post:
      tags: [Plugins]
      operationId: disableInstalledPlugin
      parameters:
        - $ref: "#/components/parameters/PluginID"
      responses:
        "200":
          description: Plugin disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledPluginEnvelope"
  /plugins/{pluginID}/upgrade:
    post:
      tags: [Plugins]
      operationId: upgradeInstalledPlugin
      parameters:
        - $ref: "#/components/parameters/PluginID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginInstallRequest"
      responses:
        "200":
          description: Plugin upgraded and manifest snapshot refreshed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledPluginEnvelope"
  /plugins/{pluginID}/config:
    put:
      tags: [Plugins]
      operationId: configureInstalledPlugin
      parameters:
        - $ref: "#/components/parameters/PluginID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginConfigRequest"
      responses:
        "200":
          description: Plugin configuration updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledPluginEnvelope"

name: contracts-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - run: npm ci
      - run: npm test

  consumers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        consumer:
          - soha
          - soha-web
          - soha-cli
          - soha-agent
    steps:
      - uses: actions/checkout@v4
        with:
          path: soha-contracts
      - uses: actions/checkout@v4
        with:
          repository: opensoha/${{ matrix.consumer }}
          path: ${{ matrix.consumer }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - run: npm ci
        working-directory: soha-contracts
      - run: npm run check:consumers -- --consumer ${{ matrix.consumer }} --require-all
        working-directory: soha-contracts

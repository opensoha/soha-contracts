name: contracts-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true
      - run: npm ci
      - run: npm test

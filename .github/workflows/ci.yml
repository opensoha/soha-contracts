name: contracts-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - run: npm ci
      - run: npm test
      - name: Go vet
        run: GOWORK=off go vet ./...
      - name: Govulncheck
        run: GOWORK=off go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...
      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          only-new-issues: true
          args: --timeout=5m

  consumers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        consumer:
          - soha
          - soha-web
          - soha-cli
          - soha-agent
    steps:
      - uses: actions/checkout@v4
        with:
          path: soha-contracts
      - uses: actions/checkout@v4
        with:
          repository: opensoha/${{ matrix.consumer }}
          path: ${{ matrix.consumer }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - run: npm ci
        working-directory: soha-contracts
      - run: npm run check:consumers -- --consumer ${{ matrix.consumer }} --require-all
        working-directory: soha-contracts

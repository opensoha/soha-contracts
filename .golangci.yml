version: "2"

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 50

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - errcheck
    - bodyclose
    - sqlclosecheck
    - gosec
    - ineffassign
    - revive
    - testifylint
  exclusions:
    paths:
      - vendor$
      - third_party$
  settings:
    errcheck:
      check-type-assertions: true
    revive:
      rules:
        - name: exported
          disabled: true
